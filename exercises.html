<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Упражнения — MoveAble</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/exercises.css" />
</head>
<body>
<div class="app">

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item" data-page="home">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      <span data-i18n="nav_home">Главная</span>
    </a>
    <a href="exercises.html" class="nav-item active" data-page="exercises">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
      <span data-i18n="nav_exercises">Упражнения</span>
    </a>
    <a href="session.html" class="nav-item nav-item--cta" data-page="session">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5,3 19,12 5,21"/></svg>
    </a>
    <a href="progress.html" class="nav-item" data-page="progress">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span data-i18n="nav_progress">Прогресс</span>
    </a>
    <a href="profile.html" class="nav-item" data-page="profile">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span data-i18n="nav_profile">Профиль</span>
    </a>
  </nav>

  <main class="page-content">
    <header class="page-header">
      <h1 data-i18n="ex_page_title">Упражнения</h1>
    </header>

    <!-- Filter tabs -->
    <div class="filter-tabs" id="filter-tabs">
      <button class="filter-tab active" data-cat="all" onclick="filterExercises('all', this)" data-i18n="ex_all">Все</button>
      <button class="filter-tab" data-cat="arms" onclick="filterExercises('arms', this)" data-i18n="ex_arms">Руки</button>
      <button class="filter-tab" data-cat="legs" onclick="filterExercises('legs', this)" data-i18n="ex_legs">Ноги</button>
      <button class="filter-tab" data-cat="neck" onclick="filterExercises('neck', this)" data-i18n="ex_neck">Шея</button>
      <button class="filter-tab" data-cat="back" onclick="filterExercises('back', this)" data-i18n="ex_back">Спина</button>
      <button class="filter-tab" data-cat="core" onclick="filterExercises('core', this)" data-i18n="ex_core">Корпус</button>
      <button class="filter-tab" data-cat="full" onclick="filterExercises('full', this)" data-i18n="ex_full">Разминка</button>
    </div>

    <!-- Exercise list -->
    <div class="exercise-list" id="exercise-list"></div>

    <!-- Exercise Detail Modal -->
    <div class="modal-overlay hidden" id="modal-overlay" onclick="closeModal()">
      <div class="modal" id="exercise-modal" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <div class="modal-icon" id="modal-icon"></div>
        <h2 class="modal-title" id="modal-title"></h2>
        <p class="modal-desc" id="modal-desc"></p>
        <div class="modal-meta" id="modal-meta"></div>
        <div class="modal-steps" id="modal-steps"></div>
        <button class="btn-primary" onclick="startExercise()" data-i18n="ex_start">Начать упражнение</button>
      </div>
    </div>

  </main>
</div>

<script src="js/i18n.js"></script>
<script src="js/storage.js"></script>
<script src="js/exercises.js"></script>
<script src="js/exercises-page.js"></script>
<script>
  initExercisesPage();
</script>
</body>
</html>
