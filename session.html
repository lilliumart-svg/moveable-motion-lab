<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Тренировка — MoveAble</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#000;color:#F7F7F7;font-family:'Inter',sans-serif;min-height:100dvh;overflow:hidden}

    /* FULLSCREEN CAMERA */
    #camera-feed{
      position:fixed;inset:0;
      width:100%;height:100dvh;
      object-fit:cover;
      transform:scaleX(-1);
      display:block;
    }
    #pose-canvas{
      position:fixed;inset:0;
      width:100%;height:100dvh;
      transform:scaleX(-1);
      pointer-events:none;
      z-index:2;
    }

    /* Dark gradient overlays */
    .overlay-top{
      position:fixed;top:0;left:0;right:0;height:160px;
      background:linear-gradient(to bottom,rgba(0,0,0,.75),transparent);
      z-index:3;pointer-events:none;
    }
    .overlay-bottom{
      position:fixed;bottom:0;left:0;right:0;height:55%;
      background:linear-gradient(to top,rgba(0,0,0,.92) 60%,transparent);
      z-index:3;pointer-events:none;
    }

    /* TOP BAR */
    .top-bar{
      position:fixed;top:0;left:0;right:0;z-index:10;
      display:flex;align-items:center;gap:12px;
      padding:16px 20px;
    }
    .btn-back{
      width:40px;height:40px;
      background:rgba(255,255,255,.15);
      border:1px solid rgba(255,255,255,.2);
      border-radius:12px;
      display:flex;align-items:center;justify-content:center;
      color:#fff;text-decoration:none;flex-shrink:0;
      backdrop-filter:blur(8px);
    }
    .prog-bar{flex:1;height:4px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden}
    .prog-fill{height:100%;background:#4ECDC4;border-radius:2px;transition:width .5s ease;width:0%}
    .prog-lbl{font-size:.78rem;color:rgba(255,255,255,.7);font-weight:600;white-space:nowrap}

    /* AI loading overlay */
    .ai-loading{
      position:fixed;inset:0;z-index:20;
      background:rgba(10,15,30,.9);
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:16px;
    }
    .spinner{width:40px;height:40px;border:3px solid rgba(78,205,196,.2);border-top-color:#4ECDC4;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .ai-loading p{font-family:'Space Grotesk',sans-serif;font-size:1rem;color:#4ECDC4}
    .ai-loading small{font-size:.8rem;color:#8892A4}

    /* No camera */
    .cam-no{
      position:fixed;inset:0;z-index:5;
      background:#060A14;
      display:none;flex-direction:column;
      align-items:center;justify-content:center;gap:12px;
      color:#4A5568;
    }
    .cam-no svg{width:48px;height:48px;stroke:#4A5568}
    .cam-no p{font-size:.9rem}

    /* CV FEEDBACK BUBBLE — top center */
    .cv-bubble{
      position:fixed;top:80px;left:50%;transform:translateX(-50%);
      z-index:10;
      background:rgba(0,0,0,.6);
      border:1px solid rgba(78,205,196,.5);
      border-radius:20px;
      padding:8px 20px;
      font-size:.82rem;font-weight:600;color:#4ECDC4;
      white-space:nowrap;
      backdrop-filter:blur(8px);
      transition:all .3s;
      opacity:0;
    }
    .cv-bubble.show{opacity:1}
    .cv-bubble.good{border-color:rgba(107,203,119,.6);color:#6BCB77}
    .cv-bubble.warn{border-color:rgba(255,107,107,.5);color:#FF6B6B}

    /* BOTTOM PANEL */
    .bottom-panel{
      position:fixed;bottom:0;left:0;right:0;
      z-index:10;
      padding:16px 20px 32px;
    }

    /* Metrics row */
    .metrics-row{
      display:flex;gap:10px;margin-bottom:12px;
    }
    .metric-chip{
      flex:1;background:rgba(0,0,0,.5);
      border:1px solid rgba(255,255,255,.12);
      border-radius:14px;padding:10px 8px;text-align:center;
      backdrop-filter:blur(8px);
    }
    .metric-chip.accent{border-color:rgba(78,205,196,.5);background:rgba(78,205,196,.12)}
    .metric-num{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:700;color:#4ECDC4;line-height:1}
    .metric-lbl{font-size:.62rem;color:rgba(255,255,255,.5);margin-top:2px}
    .rep-chip .metric-num{color:#FFD93D}
    .rep-chip{border-color:rgba(255,217,61,.4)!important;background:rgba(255,217,61,.08)!important}

    /* Accuracy */
    .acc-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
    .acc-lbl{font-size:.65rem;color:rgba(255,255,255,.4);white-space:nowrap}
    .acc-bar{flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
    .acc-fill{height:100%;background:#4ECDC4;border-radius:2px;transition:width .5s ease;width:0%}
    .acc-pct{font-size:.65rem;color:#4ECDC4;font-weight:700;min-width:28px;text-align:right}

    /* Exercise name + desc */
    .ex-name{
      font-family:'Space Grotesk',sans-serif;
      font-size:1.15rem;font-weight:700;
      margin-bottom:3px;
    }
    .ex-desc{font-size:.78rem;color:rgba(255,255,255,.55);margin-bottom:12px;line-height:1.4}

    /* Steps — compact */
    .steps{display:flex;flex-direction:column;gap:0;margin-bottom:14px}
    .step{display:flex;gap:8px;align-items:flex-start;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06)}
    .step:last-child{border-bottom:none}
    .step-n{width:18px;height:18px;flex-shrink:0;border-radius:50%;background:rgba(78,205,196,.15);border:1px solid rgba(78,205,196,.5);font-size:.6rem;font-weight:700;color:#4ECDC4;display:flex;align-items:center;justify-content:center}
    .step-t{font-size:.78rem;line-height:1.5;color:rgba(255,255,255,.8)}

    /* SVG hint — bottom right corner */
    .svg-hint{
      position:fixed;bottom:110px;right:16px;z-index:10;
      width:88px;height:88px;
      background:rgba(0,0,0,.6);
      border:1px solid rgba(78,205,196,.3);
      border-radius:16px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:3px;padding:6px;
      backdrop-filter:blur(8px);
    }
    .svg-hint svg{width:52px;height:52px}
    .svg-hint-lbl{font-size:.52rem;color:rgba(255,255,255,.4);text-align:center}

    /* Buttons */
    .btns{display:flex;gap:10px}
    .btn-skip{
      flex:1;padding:14px;
      background:rgba(255,255,255,.1);
      border:1px solid rgba(255,255,255,.15);
      border-radius:12px;color:rgba(255,255,255,.6);
      font-family:'Space Grotesk',sans-serif;font-size:.9rem;font-weight:600;
      cursor:pointer;transition:all .2s;
      backdrop-filter:blur(8px);
    }
    .btn-skip:hover{border-color:#4ECDC4;color:#4ECDC4}
    .btn-next{
      flex:2;padding:14px;
      background:#4ECDC4;color:#0A0F1E;
      border-radius:12px;border:none;
      font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:700;
      cursor:pointer;transition:all .2s;
    }
    .btn-next:hover{background:#5ED8CF}

    /* DONE SCREEN */
    .done{
      position:fixed;inset:0;z-index:30;
      display:none;flex-direction:column;
      align-items:center;justify-content:center;
      text-align:center;gap:18px;padding:40px 24px;
      background:#0A0F1E;
    }
    .done-icon{font-size:4.5rem}
    .done-title{font-family:'Space Grotesk',sans-serif;font-size:1.9rem;font-weight:700}
    .done-sub{color:#8892A4;font-size:.9rem}
    .done-row{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
    .done-stat{text-align:center}
    .done-val{font-family:'Space Grotesk',sans-serif;font-size:1.7rem;font-weight:700;color:#4ECDC4}
    .done-lbl{font-size:.72rem;color:#8892A4;margin-top:2px}
    .done-ach{background:rgba(255,217,61,.1);border:1px solid #FFD93D;border-radius:12px;padding:10px 20px;color:#FFD93D;font-size:.88rem;font-weight:600;display:none}
    .btn-home{width:100%;max-width:280px;padding:15px;background:#4ECDC4;color:#0A0F1E;border-radius:12px;border:none;font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer}
  </style>
</head>
<body>

<!-- FULLSCREEN CAMERA -->
<video id="camera-feed" autoplay muted playsinline></video>
<canvas id="pose-canvas"></canvas>
<div class="overlay-top"></div>
<div class="overlay-bottom"></div>

<!-- AI LOADING -->
<div class="ai-loading" id="ai-loading">
  <div class="spinner"></div>
  <p>Загрузка AI…</p>
  <small>MediaPipe Pose Detection</small>
</div>

<!-- NO CAMERA -->
<div class="cam-no" id="cam-no">
  <svg viewBox="0 0 24 24" fill="none"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" stroke-width="2"/><circle cx="12" cy="13" r="4" stroke-width="2"/></svg>
  <p>Разрешите доступ к камере</p>
</div>

<!-- TOP BAR -->
<div class="top-bar">
  <a href="index.html" class="btn-back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15,18 9,12 15,6"/></svg>
  </a>
  <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
  <span class="prog-lbl" id="prog-lbl">1 / 5</span>
</div>

<!-- CV FEEDBACK -->
<div class="cv-bubble" id="cv-bubble"></div>

<!-- SVG HINT bottom right -->
<div class="svg-hint">
  <svg id="hint-svg" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"></svg>
  <span class="svg-hint-lbl" id="hint-lbl">Как делать</span>
</div>

<!-- BOTTOM PANEL -->
<div class="bottom-panel">
  <div class="metrics-row">
    <div class="metric-chip accent">
      <div class="metric-num" id="m-val">10</div>
      <div class="metric-lbl" id="m-lbl">повт.</div>
    </div>
    <div class="metric-chip">
      <div class="metric-num" id="m-sets">3</div>
      <div class="metric-lbl">подх.</div>
    </div>
    <div class="metric-chip rep-chip">
      <div class="metric-num" id="rep-live">0</div>
      <div class="metric-lbl">CV счёт</div>
    </div>
  </div>

  <div class="acc-row">
    <span class="acc-lbl">Точность</span>
    <div class="acc-bar"><div class="acc-fill" id="acc-fill"></div></div>
    <span class="acc-pct" id="acc-pct">—</span>
  </div>

  <div class="ex-name" id="ex-name">—</div>
  <div class="ex-desc" id="ex-desc">—</div>
  <div class="steps" id="steps"></div>

  <div class="btns">
    <button class="btn-skip" onclick="skipEx()">Пропустить</button>
    <button class="btn-next" id="btn-next" onclick="nextEx()">Следующее →</button>
  </div>
</div>

<!-- DONE -->
<div class="done" id="done">
  <div class="done-icon">🎉</div>
  <div class="done-title" id="done-title">Отлично!</div>
  <div class="done-sub">Тренировка завершена</div>
  <div class="done-row">
    <div class="done-stat"><div class="done-val" id="d-cnt">0</div><div class="done-lbl">упражнений</div></div>
    <div class="done-stat"><div class="done-val" id="d-min">0</div><div class="done-lbl">минут</div></div>
    <div class="done-stat"><div class="done-val" id="d-reps">0</div><div class="done-lbl">CV повторений</div></div>
    <div class="done-stat"><div class="done-val" id="d-acc">—</div><div class="done-lbl">точность</div></div>
  </div>
  <div class="done-ach" id="done-ach"></div>
  <button class="btn-home" onclick="window.location='index.html'">На главную</button>
</div>

<script src="js/i18n.js"></script>
<script src="js/storage.js"></script>
<script src="js/exercises.js"></script>
<script>
const lang = getLang() || detectLang();
setLang(lang);
const cat = localStorage.getItem('mv_session_cat') || 'arms';
const plan = getSessionPlan(cat, lang);
let idx = 0;
const t0 = Date.now();
let accuracySum=0, accuracyCount=0;
let repCount=0, totalReps=0;
let repState='down', lastRepTime=0;
let mpCamera=null;

// ── AUDIO ──
const audioCtx = new (window.AudioContext||window.webkitAudioContext)();
function playBeep(freq,dur,vol){
  try{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.frequency.value=freq||880;o.type='sine';
    g.gain.setValueAtTime(vol||0.3,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+(dur||0.12));
    o.start();o.stop(audioCtx.currentTime+(dur||0.12));
  }catch(e){}
}
function playVictory(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>playBeep(f,.2,.35),i*130));}
function speakCount(n){const f=Math.min(880,330+(n-1)*40);playBeep(f*.75,.07,.2);setTimeout(()=>playBeep(f,.13,.3),80);}
function unlockAudio(){if(audioCtx.state==='suspended')audioCtx.resume();document.removeEventListener('touchstart',unlockAudio);document.removeEventListener('click',unlockAudio);}
document.addEventListener('touchstart',unlockAudio);
document.addEventListener('click',unlockAudio);

// ── SVG HINTS ──
const SVG={
  arms:`<g stroke="#4ECDC4" stroke-width="2.5" stroke-linecap="round" fill="none"><circle cx="40" cy="12" r="7"/><line x1="40" y1="19" x2="40" y2="46"/><line x1="40" y1="46" x2="30" y2="64"/><line x1="40" y1="46" x2="50" y2="64"/><line x1="40" y1="30" x2="22" y2="42"/><line x1="40" y1="30" x2="58" y2="42"><animateTransform attributeName="transform" type="rotate" values="0 40 30;-38 40 30;0 40 30" dur="1.5s" repeatCount="indefinite"/></line></g>`,
  legs:`<g stroke="#4ECDC4" stroke-width="2.5" stroke-linecap="round" fill="none"><circle cx="40" cy="12" r="7"/><line x1="40" y1="19" x2="40" y2="46"/><line x1="40" y1="30" x2="26" y2="40"/><line x1="40" y1="30" x2="54" y2="40"/><line x1="40" y1="46" x2="33" y2="60"/><line x1="33" y1="60" x2="28" y2="74"><animateTransform attributeName="transform" type="rotate" values="0 33 60;38 33 60;0 33 60" dur="1.6s" repeatCount="indefinite"/></line><line x1="40" y1="46" x2="47" y2="60"/><line x1="47" y1="60" x2="52" y2="74"/></g>`,
  neck:`<g stroke="#4ECDC4" stroke-width="2.5" stroke-linecap="round" fill="none"><circle cx="40" cy="12" r="7"><animateTransform attributeName="transform" type="rotate" values="0 40 19;18 40 19;-18 40 19;0 40 19" dur="2s" repeatCount="indefinite"/></circle><line x1="40" y1="19" x2="40" y2="46"/><line x1="40" y1="30" x2="26" y2="42"/><line x1="40" y1="30" x2="54" y2="42"/><line x1="40" y1="46" x2="30" y2="64"/><line x1="40" y1="46" x2="50" y2="64"/></g>`,
  back:`<g stroke="#4ECDC4" stroke-width="2.5" stroke-linecap="round" fill="none"><circle cx="40" cy="12" r="7"/><path d="M40 19 Q34 33 40 46"><animate attributeName="d" values="M40 19 Q34 33 40 46;M40 19 Q46 33 40 46;M40 19 Q34 33 40 46" dur="2s" repeatCount="indefinite"/></path><line x1="40" y1="30" x2="26" y2="42"/><line x1="40" y1="30" x2="54" y2="42"/><line x1="40" y1="46" x2="30" y2="64"/><line x1="40" y1="46" x2="50" y2="64"/></g>`,
  core:`<g stroke="#4ECDC4" stroke-width="2.5" stroke-linecap="round" fill="none"><circle cx="40" cy="12" r="7"/><line x1="40" y1="19" x2="40" y2="46"/><line x1="40" y1="30" x2="26" y2="42"/><line x1="40" y1="30" x2="54" y2="42"/><line x1="40" y1="46" x2="30" y2="64"/><line x1="40" y1="46" x2="50" y2="64"/><ellipse cx="40" cy="33" rx="9" ry="5" opacity=".5"><animate attributeName="rx" values="9;14;9" dur="1.4s" repeatCount="indefinite"/></ellipse></g>`,
  full:`<g stroke="#4ECDC4" stroke-width="2.5" stroke-linecap="round" fill="none"><circle cx="40" cy="12" r="7"/><line x1="40" y1="19" x2="40" y2="46"/><line x1="40" y1="30" x2="26" y2="42"><animateTransform attributeName="transform" type="rotate" values="0 40 30;-22 40 30;0 40 30" dur="1s" repeatCount="indefinite"/></line><line x1="40" y1="30" x2="54" y2="42"><animateTransform attributeName="transform" type="rotate" values="0 40 30;22 40 30;0 40 30" dur="1s" repeatCount="indefinite"/></line><line x1="40" y1="46" x2="30" y2="64"/><line x1="40" y1="46" x2="50" y2="64"/></g>`,
};

// ── DETECTION (from old Replit code) ──
function angle3(a,b,c){const ab={x:a.x-b.x,y:a.y-b.y},cb={x:c.x-b.x,y:c.y-b.y};return Math.atan2(Math.abs(ab.x*cb.y-ab.y*cb.x),ab.x*cb.x+ab.y*cb.y)*180/Math.PI;}

function detect(lm,category){
  switch(category){
    case 'arms':{
      const s=lm[12],e=lm[14],h=lm[24];
      if(!s||!e||!h||s.visibility<.4||e.visibility<.4)return{good:false,repDone:false,accuracy:0,fb:lang==='en'?'🔍 Show your upper body':'🔍 Покажи верхнюю часть тела'};
      const ang=angle3(h,s,e);
      return{good:ang>60,repDone:ang>82,accuracy:Math.min(1,ang/90),fb:ang>82?(lang==='en'?'💪 Great arm raise!':'💪 Отличный подъём!'):(lang==='en'?'Raise your arm higher':'Подними руку выше')};
    }
    case 'neck':{
      const n=lm[0],l=lm[11],r=lm[12];
      if(!n||!l||!r)return{good:false,repDone:false,accuracy:0,fb:''};
      const ratio=Math.abs(n.x-(l.x+r.x)/2)/Math.max(.01,Math.abs(l.x-r.x));
      return{good:ratio>.22,repDone:ratio>.22,accuracy:Math.min(1,ratio/.22),fb:ratio>.22?(lang==='en'?'👍 Good neck tilt!':'👍 Хороший наклон!'):(lang==='en'?'Tilt head more to side':'Наклони голову в сторону')};
    }
    case 'back':{
      const l=lm[11],r=lm[12],lh=lm[23],rh=lm[24];
      if(!l||!r||!lh||!rh||[l,r,lh,rh].some(p=>p.visibility<.35))return{good:false,repDone:false,accuracy:0,fb:''};
      const rot=Math.abs((l.x+r.x)/2-(lh.x+rh.x)/2);
      return{good:rot>.06,repDone:rot>.06,accuracy:Math.min(1,rot/.1),fb:rot>.06?(lang==='en'?'🔄 Good rotation!':'🔄 Хорошее скручивание!'):(lang==='en'?'Rotate upper body more':'Скрути корпус сильнее')};
    }
    case 'legs':{
      const h=lm[24],k=lm[26];
      if(!h||!k||h.visibility<.35||k.visibility<.35)return{good:false,repDone:false,accuracy:0,fb:''};
      const r=h.y-k.y;
      return{good:r>.05,repDone:r>.05,accuracy:Math.min(1,Math.max(0,r/.08)),fb:r>.05?(lang==='en'?'🦵 Knee raised!':'🦵 Колено поднято!'):(lang==='en'?'Lift your knee higher':'Подними колено выше')};
    }
    default:{
      const n=lm[0],l=lm[11],r=lm[12];
      if(!n||!l||!r)return{good:false,repDone:false,accuracy:0,fb:''};
      const d=((l.y-n.y)+(r.y-n.y))/2;
      return{good:d<.22,repDone:d<.22,accuracy:Math.min(1,Math.max(0,1-(d-.15)/.15)),fb:d<.22?(lang==='en'?'🤷 Shoulders up!':'🤷 Плечи подняты!'):(lang==='en'?'Raise shoulders to ears':'Подними плечи к ушам')};
    }
  }
}

// ── MEDIAPIPE ──
const POSE_CONNECTIONS=[[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28],[0,11],[0,12]];
let firstResult=false;

function onPoseResults(results){
  if(!firstResult){
    firstResult=true;
    document.getElementById('ai-loading').style.display='none';
  }
  const canvas=document.getElementById('pose-canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(!results.poseLandmarks){
    showBubble(lang==='en'?'🔍 Step back — show upper body':'🔍 Отойди — покажи верхнюю часть тела','');
    return;
  }

  drawConnectors(ctx,results.poseLandmarks,POSE_CONNECTIONS,{color:'rgba(78,205,196,0.7)',lineWidth:2.5});
  drawLandmarks(ctx,results.poseLandmarks,{color:'#4ECDC4',lineWidth:1,radius:4});

  const ex=plan[idx];
  if(!ex)return;
  const {good,repDone,accuracy,fb}=detect(results.poseLandmarks,ex.category);

  accuracySum+=accuracy; accuracyCount++;
  const avg=Math.round((accuracySum/accuracyCount)*100);
  document.getElementById('acc-fill').style.width=avg+'%';
  document.getElementById('acc-pct').textContent=avg+'%';

  if(repDone&&repState==='down') repState='up';
  if(!repDone&&repState==='up'){
    repState='down';
    const now=Date.now();
    if(now-lastRepTime>800){
      lastRepTime=now;
      repCount++; totalReps++;
      speakCount(repCount);
      document.getElementById('rep-live').textContent=repCount;
      showBubble(`✅ ${lang==='en'?'Rep':'Повторение'} ${repCount}!`,'good');
      return;
    }
  }
  if(fb) showBubble(fb, good?'good':'');
}

let bubbleTimer=null;
function showBubble(msg,type){
  const el=document.getElementById('cv-bubble');
  el.textContent=msg;
  el.className='cv-bubble show'+(type?' '+type:'');
  clearTimeout(bubbleTimer);
  bubbleTimer=setTimeout(()=>el.classList.remove('show'),3000);
}

function initMediaPipe(){
  try{
    const pose=new Pose({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`});
    pose.setOptions({modelComplexity:0,smoothLandmarks:true,enableSegmentation:false,minDetectionConfidence:.5,minTrackingConfidence:.5});
    pose.onResults(onPoseResults);
    const v=document.getElementById('camera-feed');
    mpCamera=new Camera(v,{onFrame:async()=>{await pose.send({image:v});},width:640,height:480});
    mpCamera.start().catch(handleCameraError);
  }catch(e){fallbackCamera();}
}

function fallbackCamera(){
  navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}})
    .then(s=>{document.getElementById('camera-feed').srcObject=s;document.getElementById('ai-loading').style.display='none';showBubble(lang==='en'?'Camera on (no AI)':'Камера вкл (без AI)','');})
    .catch(handleCameraError);
}

function handleCameraError(){
  document.getElementById('ai-loading').style.display='none';
  document.getElementById('camera-feed').style.display='none';
  document.getElementById('cam-no').style.display='flex';
}

// ── EXERCISE ──
function loadEx(){
  if(idx>=plan.length){finish();return;}
  const ex=plan[idx];
  repCount=0;repState='down';
  document.getElementById('rep-live').textContent='0';
  document.getElementById('ex-name').textContent=ex.displayName;
  document.getElementById('ex-desc').textContent=ex.displayDesc;
  document.getElementById('m-val').textContent=ex.durationSec||ex.reps||10;
  document.getElementById('m-lbl').textContent=ex.durationSec?(lang==='en'?'sec':'сек'):(lang==='en'?'reps':'повт.');
  document.getElementById('m-sets').textContent=ex.sets||3;
  document.getElementById('steps').innerHTML=(ex.steps||[]).map((s,i)=>`<div class="step"><span class="step-n">${i+1}</span><span class="step-t">${s}</span></div>`).join('');
  document.getElementById('prog-fill').style.width=`${(idx/plan.length)*100}%`;
  document.getElementById('prog-lbl').textContent=`${idx+1} / ${plan.length}`;
  document.getElementById('hint-svg').innerHTML=SVG[ex.category]||SVG.arms;
  document.getElementById('hint-lbl').textContent=lang==='en'?'How to':'Как делать';
  document.getElementById('btn-next').textContent=idx===plan.length-1?(lang==='en'?'Complete ✓':'Завершить ✓'):(lang==='en'?'Next →':'Следующее →');
}

function nextEx(){idx++;if(idx>=plan.length)finish();else loadEx();}
function skipEx(){nextEx();}

function finish(){
  const dMin=Math.max(1,Math.round((Date.now()-t0)/60000));
  const avg=accuracyCount>0?Math.round((accuracySum/accuracyCount)*100):0;
  playVictory();
  saveSession({category:cat,title:plan[0]?.displayName||cat,durationMin:dMin,exercises:plan.map(e=>e.id)});
  const{new:na}=checkAchievements();
  if(mpCamera){mpCamera.stop();mpCamera=null;}
  const v=document.getElementById('camera-feed');
  if(v.srcObject)v.srcObject.getTracks().forEach(t=>t.stop());
  const d=document.getElementById('done');
  d.style.display='flex';
  document.getElementById('d-cnt').textContent=plan.length;
  document.getElementById('d-min').textContent=dMin;
  document.getElementById('d-reps').textContent=totalReps;
  document.getElementById('d-acc').textContent=avg+'%';
  document.getElementById('done-title').textContent=avg>=80?'🏆 '+(lang==='en'?'Champion!':'Чемпион!'):avg>=60?'⭐ '+(lang==='en'?'Amazing!':'Потрясающе!'):'💪 '+(lang==='en'?'Well done!':'Молодец!');
  if(na.length){const names={first_step:'👣 Первый шаг!',week_warrior:'🏆 Воин недели!',mover:'🚀 В движении!',dedicated:'💎 Преданность!'};const el=document.getElementById('done-ach');el.textContent=names[na[0]]||'🏅 Новое достижение!';el.style.display='block';}
}

initMediaPipe();
loadEx();
</script>
